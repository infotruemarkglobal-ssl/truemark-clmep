services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clmep_dev
      POSTGRES_USER: clmep
      POSTGRES_PASSWORD: clmep_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clmep -d clmep_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
